zitadel:
  zitadel:
    # Pre-create: kubectl create secret generic zitadel-masterkey \
    #   --from-literal=masterkey="$(openssl rand -hex 16)" \
    #   -n zitadel
    masterkeySecretName: zitadel-masterkey

    # Pre-create: kubectl create secret generic zitadel-db-credentials \
    #   --from-file=config.yaml=<(cat <<'EOSECRET'
    # Database:
    #   Postgres:
    #     User:
    #       Password: <zitadel-db-password>
    #     Admin:
    #       Password: <pg-superuser-password>
    # EOSECRET
    #   ) \
    #   -n zitadel
    existingSecret: zitadel-db-credentials

    # Inject passwords as env vars (existingSecret config.yaml not mounted in init job)
    # Pre-create: kubectl create secret generic zitadel-db-passwords
    #   --from-literal=userPassword=<...> --from-literal=adminPassword=<...> -n zitadel
    env:
      - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: zitadel-db-passwords
            key: userPassword
      - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: zitadel-db-passwords
            key: adminPassword

    configmapConfig:
      ExternalDomain: zitadel.barrows.helegoeie.dev
      ExternalSecure: true
      ExternalPort: 443
      TLS:
        Enabled: false
      Database:
        Postgres:
          Host: workout-pg-rw.workout.svc.cluster.local
          Port: 5432
          Database: zitadel
          MaxOpenConns: 20
          MaxConnLifetime: 30m
          MaxConnIdleTime: 5m
          User:
            Username: zitadel
            SSL:
              Mode: disable
          Admin:
            Username: postgres
            SSL:
              Mode: disable
