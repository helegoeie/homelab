# powersync-secret must be pre-created manually before ArgoCD sync.
# First, ensure the 'powersync' PostgreSQL user exists with REPLICATION privilege:
#
#   PGPASSWORD=$(kubectl get secret workout-pg-superuser -n workout \
#     -o jsonpath='{.data.password}' | base64 -d) \
#   kubectl run pg-init --rm -it --image=postgres:16 --restart=Never -- \
#     psql -h workout-pg-rw.workout.svc.cluster.local -U postgres \
#     -c "CREATE USER powersync WITH PASSWORD '<password>' REPLICATION; \
#         GRANT CONNECT ON DATABASE workout TO powersync;"
#
# Then create the secret:
#
#   kubectl create secret generic powersync-secret \
#     --from-literal=postgresql-uri='postgresql://powersync:<password>@workout-pg-rw.workout.svc.cluster.local:5432/workout' \
#     -n powersync
#
# This file is a placeholder; the Secret is not managed by ArgoCD.
