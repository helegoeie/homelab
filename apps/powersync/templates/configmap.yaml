apiVersion: v1
kind: ConfigMap
metadata:
  name: powersync-config
  namespace: powersync
data:
  powersync.yaml: |
    replication:
      connections:
        - type: postgresql
          uri: !env PS_POSTGRESQL_URI

    storage:
      type: postgresql
      uri: !env PS_POSTGRESQL_URI

    client_auth:
      # jwks_uri points to Zitadel's JWKS endpoint
      jwks_uri: https://zitadel.barrows.helegoeie.dev/oauth/v2/keys
      audience: ["372465282859402030"]

    api:
      parameters:
        token_header: Authorization

    sync_rules:
      path: /app/sync_rules.yml

  sync_rules.yml: |
    bucket_definitions:
      global_exercises:
        # Seeded exercises (is_custom = FALSE) are synced to every authenticated user.
        # No user_id parameter needed — these are global read-only data.
        data:
          - SELECT id, name, muscle_group, secondary_muscle_groups, is_custom, user_id,
                   created_at, updated_at
            FROM exercises
            WHERE is_custom = FALSE

      user_exercises:
        # Custom exercises (is_custom = TRUE) are scoped to their owning user only.
        parameters:
          - SELECT token_parameters.user_id as user_id
        data:
          - SELECT id, name, muscle_group, secondary_muscle_groups, is_custom, user_id,
                   created_at, updated_at
            FROM exercises
            WHERE is_custom = TRUE AND user_id = bucket.user_id
