apiVersion: v1
kind: ConfigMap
metadata:
  name: powersync-config
  namespace: powersync
data:
  powersync.yaml: |
    replication:
      connections:
        - type: postgresql
          uri: !env PS_POSTGRESQL_URI

    storage:
      type: postgresql
      uri: !env PS_POSTGRESQL_URI

    client_auth:
      # jwks_uri points to Zitadel's JWKS endpoint
      jwks_uri: https://zitadel.barrows.helegoeie.dev/oauth/v2/keys
      audience: ["372465282859402030"]

    api:
      parameters:
        token_header: Authorization

    sync_rules:
      path: /app/sync_rules.yml

  sync_rules.yml: |
    bucket_definitions:
      user_poc_entries:
        parameters:
          - SELECT token_parameters.user_id as user_id
        data:
          - SELECT id, content, user_id, created_at FROM poc_entries WHERE user_id = bucket.user_id
