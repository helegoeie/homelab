app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: journeyapps/powersync-service
            tag: latest
          env:
            - name: POSTGRESQL_URI
              valueFrom:
                secretKeyRef:
                  name: powersync-secret
                  key: postgresql-uri
  service:
    main:
      controller: main
      ports:
        http:
          port: 8080
  persistence:
    config:
      type: configMap
      name: powersync-config
      globalMounts:
        - path: /app/powersync.yaml
          subPath: powersync.yaml
