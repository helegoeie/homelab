app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: journeyapps/powersync-service
            tag: "1.20.5"
          env:
            - name: PS_POSTGRESQL_URI
              valueFrom:
                secretKeyRef:
                  name: powersync-secret
                  key: postgresql-uri
            # pgwire@0.8.1 always initiates SSL regardless of sslmode in URI.
            # CloudNativePG uses a self-signed CA; disable Node.js TLS rejection
            # for internal cluster traffic until proper cert mounting is added.
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
  service:
    main:
      controller: main
      ports:
        http:
          port: 8080
  persistence:
    config:
      type: configMap
      name: powersync-config
      globalMounts:
        - path: /app/powersync.yaml
          subPath: powersync.yaml
        - path: /app/sync_rules.yml
          subPath: sync_rules.yml
