app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: lscr.io/linuxserver/qbittorrent
            tag: latest
          env:
            TZ: Europe/Amsterdam
            PUID: "1000"
            PGID: "1000"
            WEBUI_PORT: "8080"
  service:
    main:
      controller: main
      ports:
        http:
          port: 8080
  persistence:
    config:
      existingClaim: qbittorrent-config
      globalMounts:
        - path: /config
    downloads:
      existingClaim: downloads-pvc
      globalMounts:
        - path: /downloads
