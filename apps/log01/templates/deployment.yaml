apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "log01.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "log01.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate (not RollingUpdate): the RWO SQLite volume can't be mounted by two pods.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "log01.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "log01.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        # nginx serves the SPA and proxies /api → the api sidecar over localhost.
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          env:
            - name: API_UPSTREAM
              value: "127.0.0.1:4000"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
        # Node + SQLite backend for accounts and cross-device sync.
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          env:
            - name: PORT
              value: "4000"
            - name: DB_PATH
              value: /data/log01.db
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.auth.existingSecret }}
                  key: {{ .Values.api.auth.secretKey }}
          ports:
            - name: api
              containerPort: 4000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "log01.fullname" . }}-data
