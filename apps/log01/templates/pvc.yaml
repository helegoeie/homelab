apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "log01.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "log01.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
