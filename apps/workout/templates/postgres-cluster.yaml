apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: workout-pg
  namespace: workout
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  storage:
    size: 10Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: workout
      owner: workout
  postgresql:
    pg_hba:
      - host all all 10.244.0.0/16 scram-sha-256
