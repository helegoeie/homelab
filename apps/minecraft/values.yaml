minecraft:
  minecraftServer:
    eula: "TRUE"
    type: "VANILLA"
    onlineMode: true
    viewDistance: 32
    memory: "4G"
    serviceType: LoadBalancer
    loadBalancerIP: "192.168.1.242"
    whitelist: "Helegoeie,brunwurker,creeperpower_hr,Fryslanboppe666"

    rcon:
      enabled: true
      port: 25575
      existingSecret: minecraft-rcon-secret
      secretKey: rcon-password

  extraEnv:
    ENABLE_WHITELIST: "true"

  persistence:
    storageClass: longhorn-1replica
    dataDir:
      enabled: true
      Size: 10Gi

  resources:
    requests:
      memory: 4Gi
      cpu: "1"
    limits:
      memory: 5Gi
      cpu: "4"
