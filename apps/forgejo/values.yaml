gitea:
  image:
    registry: ""
    repository: codeberg.org/forgejo/forgejo
    tag: 11
    rootless: false

  admin:
    # Pre-create: kubectl create secret generic forgejo-admin-secret \
    #   --from-literal=username='helegoeie' \
    #   --from-literal=password='<strong-admin-password>' \
    #   -n forgejo
    existingSecret: forgejo-admin-secret

  config:
    cache:
      ADAPTER: redis
      # HOST injected via GITEA__cache__HOST env var
    queue:
      TYPE: redis
      # CONN injected via GITEA__queue__CONN env var
    session:
      PROVIDER: redis
      # PROVIDER_CONFIG injected via GITEA__session__PROVIDER_CONFIG env var
    server:
      DOMAIN: forgejo.barrows.helegoeie.dev
      ROOT_URL: https://forgejo.barrows.helegoeie.dev
      HTTP_PORT: 3000

  # All database and cache settings injected via env vars to ensure
  # the init-app-ini container picks them up regardless of chart version.
  # Pre-create secrets: forgejo-db-secret, forgejo-redis-urls, forgejo-admin-secret
  extraEnvs:
    - name: GITEA__database__DB_TYPE
      value: postgres
    - name: GITEA__database__HOST
      value: workout-pg-rw.workout.svc.cluster.local:5432
    - name: GITEA__database__NAME
      value: forgejo
    - name: GITEA__database__USER
      value: forgejo
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: forgejo-db-secret
          key: password
    - name: GITEA__cache__HOST
      valueFrom:
        secretKeyRef:
          name: forgejo-redis-urls
          key: cache-url
    - name: GITEA__queue__CONN
      valueFrom:
        secretKeyRef:
          name: forgejo-redis-urls
          key: queue-url
    - name: GITEA__session__PROVIDER_CONFIG
      valueFrom:
        secretKeyRef:
          name: forgejo-redis-urls
          key: session-url

  ingress:
    enabled: false

  postgresql:
    enabled: false

  postgresql-ha:
    enabled: false

  redis-cluster:
    enabled: false

  valkey-cluster:
    enabled: false
