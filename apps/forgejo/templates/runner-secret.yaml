# token is obtained from the Forgejo admin panel:
#
#   Site Administration → Runners → Create registration token
#
#   kubectl create secret generic forgejo-runner-token \
#     --from-literal=token='<registration-token>' \
#     -n forgejo
#
# This file is a placeholder; the Secret is not managed by ArgoCD.
