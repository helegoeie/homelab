apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      securityContext:
        # Runner image runs as uid 1000; without this the PVC at /data is
        # root-owned and `forgejo-runner register` fails with
        # "open .runner: permission denied", so no runner ever comes online
        # ("no agent matching ubuntu-latest"). fsGroup makes /data group-writable.
        fsGroup: 1000
      initContainers:
        - name: register
          image: code.forgejo.org/forgejo/runner:6
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/.runner ]; then
                forgejo-runner register \
                  --no-interactive \
                  --instance http://forgejo-gitea-http.forgejo.svc.cluster.local:3000 \
                  --token "$(FORGEJO_RUNNER_REGISTRATION_TOKEN)" \
                  --name forgejo-runner \
                  --labels ubuntu-latest:docker://node:lts-bookworm
              fi
          env:
            - name: FORGEJO_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-token
                  key: token
          volumeMounts:
            - name: runner-data
              mountPath: /data
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6
          command:
            - sh
            - -c
            - |
              WAIT=0; until nc -z localhost 2375 2>/dev/null; do sleep 2; WAIT=$((WAIT+2)); [ $WAIT -ge 120 ] && exit 1; done
              exec forgejo-runner daemon
          env:
            - name: FORGEJO_INSTANCE_URL
              value: http://forgejo-gitea-http.forgejo.svc.cluster.local:3000
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          volumeMounts:
            - name: runner-data
              mountPath: /data
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
      volumes:
        - name: runner-data
          persistentVolumeClaim:
            claimName: forgejo-runner-data
