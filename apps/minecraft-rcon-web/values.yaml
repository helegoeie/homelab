rcon-web-admin:
  fullnameOverride: minecraft-rcon-web

  rconWeb:
    game: minecraft
    serverName: minecraft
    rconHost: minecraft-rcon
    rconPort: 25575
    rconPasswordExistingSecret: minecraft-rcon-secret
    rconPasswordKey: rcon-password
    passwordExistingSecret: minecraft-rcon-secret
    passwordKey: password
    username: admin
    isAdmin: true
    # Browser-facing websocket for the live console. Defaults to
    # ws://localhost:4327 which only works when browser == server.
    websocketUrl: "ws://192.168.1.243:4327"
    websocketUrlSsl: "wss://192.168.1.243:4327"

  # LAN-only LoadBalancer (MetalLB), same pattern as the minecraft service itself.
  # Reachable on the local network and via the Tailscale subnet router
  # (advertises 192.168.1.0/24) but not exposed to the public internet.
  service:
    type: LoadBalancer

  resources:
    requests:
      memory: 128Mi
      cpu: "50m"
    limits:
      memory: 256Mi
      cpu: "500m"
