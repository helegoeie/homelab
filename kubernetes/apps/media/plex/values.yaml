app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: lscr.io/linuxserver/plex
            tag: latest
          env:
            TZ: Europe/Amsterdam
            PUID: "1000"
            PGID: "1000"
            VERSION: docker
            PLEX_CLAIM: "claim-m8s8epR5k5AkN1r41ze2"
          securityContext:
            privileged: true
  service:
    main:
      controller: main
      type: LoadBalancer
      loadBalancerIP: 192.168.1.241
      ports:
        http:
          port: 32400
  persistence:
    config:
      existingClaim: plex-config
      globalMounts:
        - path: /config
    media:
      existingClaim: media-pvc
      globalMounts:
        - path: /media
    dri:
      type: hostPath
      hostPath: /dev/dri
      globalMounts:
        - path: /dev/dri
